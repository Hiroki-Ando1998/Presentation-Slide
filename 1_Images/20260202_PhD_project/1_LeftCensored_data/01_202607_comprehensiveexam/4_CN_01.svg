<svg width="1282" height="727" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" overflow="hidden"><g transform="translate(1 2)"><rect x="0" y="0" width="1280" height="720" fill="#FFFFFF"/><rect x="17" y="177" width="1244" height="225" fill="#FBF4D8" fill-opacity="0.6"/><rect x="0.500053" y="0.500053" width="321" height="37" stroke="#7F7F7F" stroke-width="1.33333" stroke-miterlimit="8" fill="#D9D9D9"/><text fill="#A6A6A6" font-family="Arial,Arial_MSFontService,sans-serif" font-weight="700" font-size="21" transform="translate(98.3799 27)">Introduction</text><rect x="320.5" y="0.500053" width="321" height="37" stroke="#7F7F7F" stroke-width="1.33333" stroke-miterlimit="8" fill="#D9D9D9"/><text fill="#A6A6A6" font-family="Arial,Arial_MSFontService,sans-serif" font-weight="700" font-size="21" transform="translate(376.718 27)">Materials &amp; Methods</text><rect x="639.5" y="0.500053" width="321" height="37" stroke="#7F7F7F" stroke-width="1.33333" stroke-miterlimit="8" fill="#D9D9D9"/><text fill="#A6A6A6" font-family="Arial,Arial_MSFontService,sans-serif" font-weight="700" font-size="21" transform="translate(690.449 27)">Results &amp; Discussion</text><rect x="959.5" y="0.500053" width="321" height="37" stroke="#7F7F7F" stroke-width="1.33333" stroke-miterlimit="8" fill="#4B5E68"/><text fill="#FFFFFF" font-family="Arial,Arial_MSFontService,sans-serif" font-weight="700" font-size="21" transform="translate(1061.32 27)">Conclusion</text><text fill="#4B5E68" font-family="Arial,Arial_MSFontService,sans-serif" font-weight="700" font-size="32" transform="translate(57.1344 81)">Development of the models to handle left</text><text fill="#4B5E68" font-family="Arial,Arial_MSFontService,sans-serif" font-weight="700" font-size="32" transform="translate(682.468 81)">-</text><text fill="#4B5E68" font-family="Arial,Arial_MSFontService,sans-serif" font-weight="700" font-size="32" transform="translate(693.134 81)">censored wastewater</text><text fill="#4B5E68" font-family="Arial,Arial_MSFontService,sans-serif" font-weight="700" font-size="32" transform="translate(1016.97 81)">-</text><text fill="#4B5E68" font-family="Arial,Arial_MSFontService,sans-serif" font-weight="700" font-size="32" transform="translate(1027.63 81)">based data</text><path d="M35.5001 412.5 1244.95 412.5" stroke="#4B5E68" stroke-miterlimit="8" stroke-dasharray="8 3" fill="none" fill-rule="evenodd"/><text fill="#5F696E" font-family="Arial,Arial_MSFontService,sans-serif" font-weight="400" font-size="24" transform="translate(93.8402 124)">The state</text><text fill="#5F696E" font-family="Arial,Arial_MSFontService,sans-serif" font-weight="400" font-size="24" transform="translate(193.84 124)">-</text><text fill="#5F696E" font-family="Arial,Arial_MSFontService,sans-serif" font-weight="400" font-size="24" transform="translate(201.84 124)">space models can improve the accuracy of our understanding of temporal dynamics of</text><text fill="#5F696E" font-family="Arial,Arial_MSFontService,sans-serif" font-weight="400" font-size="24" transform="translate(93.8402 153)">wastewater concentrations, especially in the early phase of epidemic</text><text fill="#5F696E" font-family="Arial,Arial_MSFontService,sans-serif" font-weight="400" font-size="24" transform="translate(57.9038 496)">•</text><text fill="#5F696E" font-family="Arial,Arial_MSFontService,sans-serif" font-weight="400" font-size="24" transform="translate(87.9038 496)">If the number of positive samples are not obtained in recent days, estimated recent wastewater</text><text fill="#5F696E" font-family="Arial,Arial_MSFontService,sans-serif" font-weight="400" font-size="24" transform="translate(87.9038 525)">concentrations are not reliable.</text><text fill="#4B5E68" font-family="Arial,Arial_MSFontService,sans-serif" font-weight="700" font-size="24" transform="translate(52.7782 446)">Limitations and assumptions</text><text fill="#5F696E" font-family="Arial,Arial_MSFontService,sans-serif" font-weight="400" font-size="24" transform="translate(57.1344 573)">•</text><text fill="#5F696E" font-family="Arial,Arial_MSFontService,sans-serif" font-weight="400" font-size="24" transform="translate(87.1344 573)">They are may not be applicable to facility</text><text fill="#5F696E" font-family="Arial,Arial_MSFontService,sans-serif" font-weight="400" font-size="24" transform="translate(521.801 573)">-</text><text fill="#5F696E" font-family="Arial,Arial_MSFontService,sans-serif" font-weight="400" font-size="24" transform="translate(529.801 573)">level data, as the assumption about random walk process may not</text><text fill="#5F696E" font-family="Arial,Arial_MSFontService,sans-serif" font-weight="400" font-size="24" transform="translate(87.1344 602)">be appropriate.</text><text fill="#5F696E" font-family="Arial,Arial_MSFontService,sans-serif" font-weight="400" font-size="24" transform="translate(57.1344 703)">•</text><text fill="#5F696E" font-family="Arial,Arial_MSFontService,sans-serif" font-weight="400" font-size="24" transform="translate(87.1344 703)">No environmental factors aside from variability in fecal strength are not explicitly considered.</text><text fill="#5F696E" font-family="Arial,Arial_MSFontService,sans-serif" font-weight="400" font-size="24" transform="translate(57.9038 243)">•</text><text fill="#5F696E" font-family="Arial,Arial_MSFontService,sans-serif" font-weight="400" font-size="24" transform="translate(87.9038 243)">The models show higher estimation accuracy than the substitution method in the simulation analysis.</text><text fill="#4B5E68" font-family="Arial,Arial_MSFontService,sans-serif" font-weight="700" font-size="24" transform="translate(57.9038 206)">Summary of findings</text><text fill="#5F696E" font-family="Arial,Arial_MSFontService,sans-serif" font-weight="400" font-size="24" transform="translate(57.9038 303)">•</text><text fill="#5F696E" font-family="Arial,Arial_MSFontService,sans-serif" font-weight="400" font-size="24" transform="translate(87.9038 303)">The models are applicable to real</text><text fill="#5F696E" font-family="Arial,Arial_MSFontService,sans-serif" font-weight="400" font-size="24" transform="translate(442.57 303)">-</text><text fill="#5F696E" font-family="Arial,Arial_MSFontService,sans-serif" font-weight="400" font-size="24" transform="translate(450.57 303)">world data, suggesting that the substitution method may overestimate</text><text fill="#5F696E" font-family="Arial,Arial_MSFontService,sans-serif" font-weight="400" font-size="24" transform="translate(87.9038 332)">wastewater concentrations in the early phase of an epidemic.</text><text fill="#5F696E" font-family="Arial,Arial_MSFontService,sans-serif" font-weight="400" font-size="24" transform="translate(57.9038 385)">•</text><text fill="#5F696E" font-family="Arial,Arial_MSFontService,sans-serif" font-weight="400" font-size="24" transform="translate(87.9038 385)">The models also enable to compare sensitivities of detection methods.</text><text fill="#5F696E" font-family="Arial,Arial_MSFontService,sans-serif" font-weight="400" font-size="24" transform="translate(57.1344 649)">•</text><text fill="#5F696E" font-family="Arial,Arial_MSFontService,sans-serif" font-weight="400" font-size="24" transform="translate(87.1344 649)">A high precision method is needed to use a biomarker (i.e.,</text><text fill="#5F696E" font-family="Arial,Arial_MSFontService,sans-serif" font-weight="400" font-size="24" transform="translate(719.141 649)">PMMoV</text><text fill="#5F696E" font-family="Arial,Arial_MSFontService,sans-serif" font-weight="400" font-size="24" transform="translate(804.474 649)">) to adjust fluctuations of fecal strength.</text></g></svg>