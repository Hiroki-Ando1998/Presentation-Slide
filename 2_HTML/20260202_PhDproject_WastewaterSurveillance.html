  <!-- reveal.js core CSS -->
  <link rel="stylesheet" href="../dist/reset.css">
  <link rel="stylesheet" href="../dist/reveal.css">

  <!-- White theme -->
  <link rel="stylesheet" href="../dist/theme/white.css">

  <!-- Force pure white background -->
  <style>
    html, body {
      background-color: #ffffff;
    }
    .reveal {
      background-color: #ffffff;
    }
  </style>

  <!-- Page number style------------------------------------------- Page number style -->
  <style>
    .reveal .slide-number {
      font-size: 44px;
      right: 20px;
      bottom: 20px;
      background: rgba(255, 255, 255, 0.85);
      color: #000;
      padding: 6px 12px;
      border-radius: 8px;
    }
  </style>

  
  <!-- Slide Controls botton style------------------------------------------- Slide Controls botton style -->
  <style>
    .reveal .controls {
      right: 70px;
      left: auto;
      top: 50%;
      bottom: auto;
      transform: translateY(-50%) scale(1.4);
    }

    /* Hide vertical navigation */
    .reveal .controls .navigate-up,
    .reveal .controls .navigate-down {
      display: none;
    }

    /* Slide jump input box - fixed on top, always visible */
    #slide-jump {
  position: fixed;       /* スライドに埋もれない */
  right: 185px;           /* 右端に寄せる */
  bottom: 10px;         /* 矢印の下に配置（矢印は530px, or 50%が中心位置なので調整） */
  width: 140px;          /* 幅を大きく */
  height: 60px;          /* 高さを大きく */
  font-size: 28px;       /* 文字も大きく */
  padding: 6px 10px;
  z-index: 9999;         /* 常に上に表示 */
  border-radius: 6px;
  border: 1px solid #ccc;
  background-color: rgba(255, 255, 255, 0.95);
  text-align: center;
}
  </style>

  <!-- Video style------------------------------------------- Video style -->
<style>
.reveal section {
  position: relative;
  width: 100%;
  height: 100%;
}

.right-video {
  position: absolute;
  top: 73%;
  right: 8.5%;
  transform: translateY(-50%);
  width: 30vw;        
  max-width: 720px;  
  height: auto;       /* 縦横比保持 */

  z-index: 9999;
  box-shadow: 0 0 12px rgba(0,0,0,0.4);
}
</style>
<!-- Video style------------------------------------------- Video style -->

  <script src="../dist/reveal.js"></script>

  <script>
    // --- Reveal.js 初期化 ---
    Reveal.initialize({
      hash: true,
      slideNumber: 'c/t', // Page number
      controls: true,   
      width: "100%",
      height: "100%",
      margin: 0,
      minScale: 1,
      maxScale: 1
    });

    // --- スライドジャンプ機能 ---
    Reveal.on('ready', function() {
      const slideInput = document.getElementById('slide-jump');
      
      // Enterキーでジャンプ
      slideInput.addEventListener('keypress', function(event) {
        if (event.key === 'Enter') {
          const num = parseInt(slideInput.value);
          if (!isNaN(num)) {
            Reveal.slide(num - 1); // 0スタート
            slideInput.value = '';
          }
        }
      });
    });
  </script>
